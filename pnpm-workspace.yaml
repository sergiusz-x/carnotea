packages:
  - 'apps/*'
  - 'packages/*'
  - 'tooling/*'

linkWorkspacePackages: true

# Native modules that must be built before they can be used
onlyBuiltDependencies:
  - esbuild

# Dependency catalog — single source of truth for shared versions.
# Packages reference these with `"zod": "catalog:"` instead of pinning a version
# locally, so the whole monorepo upgrades in one place and `sherif` can prove
# there is no drift. Scaffold tickets (T-001+) extend this list as they add deps.
catalog:
  # Language + lint toolchain
  typescript: ^6.0.3
  eslint: ^10.5.0
  '@eslint/js': ^10.0.1
  eslint-plugin-import: ^2.31.0
  eslint-plugin-jsx-a11y: ^6.10.0
  eslint-plugin-react: ^7.37.2
  eslint-plugin-react-hooks: ^7.1.1
  globals: ^17.6.0
  prettier: ^3.4.0
  typescript-eslint: ^8.18.2
  # Validation (used by api, web, shared)
  zod: ^4.4.3
  # Testing
  vitest: ^4.1.8
  # Pinned to v7: unplugin-swc 1.5.9 does not yet support vite 8's Oxc transform.
  vite: ^7.3.5
  # Types
  '@types/node': ^25.9.3
  # Database
  drizzle-orm: ^0.45.2
  drizzle-kit: ^0.31.10
  postgres: ^3.4.9
  # API (apps/api) — NestJS + Fastify stack
  '@nestjs/common': ^11.1.26
  '@nestjs/core': ^11.1.26
  '@nestjs/config': ^4.0.4
  '@nestjs/platform-fastify': ^11.1.26
  '@nestjs/testing': ^11.1.26
  '@nestjs/cli': ^11.0.23
  fastify: ^5.8.5
  nestjs-pino: ^4.6.1
  pino-http: ^11.0.0
  pino-pretty: ^13.1.3
  reflect-metadata: ^0.2.2
  rxjs: ^7.8.2
  '@swc/cli': ^0.8.1
  '@swc/core': ^1.15.41
  unplugin-swc: ^1.5.9
  # OpenAPI (apps/api)
  '@asteasolutions/zod-to-openapi': ^8.5.0
  '@fastify/swagger': ^9.7.0
  '@fastify/swagger-ui': ^6.0.0

# React-family versions live in a named catalog so non-React packages never
# accidentally pull them in.
catalogs:
  react19:
    react: ^19.0.0
    react-dom: ^19.0.0
    '@types/react': ^19.0.0
    '@types/react-dom': ^19.0.0
