packages:
  - 'apps/*'
  - 'packages/*'
  - 'tooling/*'

linkWorkspacePackages: true

# Native modules that must be built before they can be used
onlyBuiltDependencies:
  - esbuild

# Dependency catalog — single source of truth for shared versions.
# Packages reference these with `"zod": "catalog:"` instead of pinning a version
# locally, so the whole monorepo upgrades in one place and `sherif` can prove
# there is no drift. Scaffold tickets (T-001+) extend this list as they add deps.
catalog:
  # Language + lint toolchain
  typescript: ^6.0.3
  eslint: ^10.5.0
  '@eslint/js': ^10.0.1
  eslint-plugin-import-x: ^4.16.2
  eslint-plugin-jsx-a11y: ^6.10.0
  eslint-plugin-react: ^7.37.2
  eslint-plugin-react-hooks: ^7.1.1
  globals: ^17.6.0
  prettier: ^3.4.0
  typescript-eslint: ^8.61.1
  # Validation (used by api, web, shared)
  zod: ^4.4.3
  # Web build toolchain
  vite: ^8.0.16
  '@vitejs/plugin-react': ^6.0.2
  # i18n (apps/web) — ADR-0007
  i18next: ^26.3.1
  react-i18next: ^17.0.8
  i18next-browser-languagedetector: ^8.2.1
  # Forms (apps/web) — T-031
  react-hook-form: ^7.80.0
  '@hookform/resolvers': ^5.4.0
  '@radix-ui/react-label': ^2.1.10
  '@radix-ui/react-slot': ^1.3.0
  # Tailwind CSS v4 + shadcn/ui dependencies
  tailwindcss: ^4.3.1
  '@tailwindcss/vite': ^4.3.1
  lucide-react: ^1.21.0
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  class-variance-authority: ^0.7.1
  # Web routing + server-state (TanStack)
  '@tanstack/react-query': ^5.101.0
  '@tanstack/react-query-devtools': ^5.101.0
  '@tanstack/react-router': ^1.170.16
  '@tanstack/react-router-devtools': ^1.167.0
  # Testing
  vitest: ^4.1.9
  jsdom: ^29.1.1
  '@testing-library/react': ^16.3.2
  '@testing-library/dom': ^10.4.1
  '@testing-library/jest-dom': ^6.9.1
  # Types
  '@types/node': ^26.0.0
  # Database
  drizzle-orm: ^0.45.2
  drizzle-kit: ^0.31.10
  postgres: ^3.4.9
  # OpenAPI / Zod-to-OpenAPI
  '@asteasolutions/zod-to-openapi': ^8.5.0
  # API (apps/api) — NestJS + Fastify stack
  '@nestjs/common': ^11.1.26
  '@nestjs/core': ^11.1.26
  '@nestjs/config': ^4.0.4
  '@nestjs/platform-fastify': ^11.1.26
  '@nestjs/testing': ^11.1.26
  '@nestjs/cli': ^11.0.23
  fastify: ^5.8.5
  nestjs-pino: ^4.6.1
  pino-http: ^11.0.0
  pino-pretty: ^13.1.3
  reflect-metadata: ^0.2.2
  rxjs: ^7.8.2
  '@swc/cli': ^0.8.1
  '@swc/core': ^1.15.41
  # Auth (apps/api) — better-auth, ADR-0004
  better-auth: ^1.6.20
  # Email transport (apps/api) — T-051
  nodemailer: ^9.0.1
  '@types/nodemailer': ^8.0.1
  # Security — T-049
  '@fastify/helmet': ^13.0.2
  '@fastify/rate-limit': ^11.0.0
  '@fastify/cors': ^11.2.0

# React-family versions live in a named catalog so non-React packages never
# accidentally pull them in.
catalogs:
  react19:
    react: ^19.0.0
    react-dom: ^19.0.0
    '@types/react': ^19.0.0
    '@types/react-dom': ^19.0.0
