<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>CarNotea</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preload the primary font subsets to avoid a flash on first paint -->
    <link
      rel="preload"
      href="/fonts/inter-latin-wght-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/space-grotesk-latin-wght-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0e0e10" />

    <!-- Apple / iOS PWA meta tags -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CarNotea" />

    <script>
      // Apply the persisted/preferred theme before first paint so the page never
      // flashes the wrong colour scheme. ThemeProvider reads this class back.
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme =
            stored === 'dark' || stored === 'light' ? stored : prefersDark ? 'dark' : 'light';
          document.documentElement.classList.add(theme);
        } catch (e) {
          /* localStorage/matchMedia unavailable — fall back to default styling */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
