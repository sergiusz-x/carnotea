server {
    listen       80;
    server_name  _;

    # Docker's embedded DNS — required so proxy_pass re-resolves the api
    # container's address per request instead of caching it once at nginx
    # startup (which would break if api restarts with a new IP, or if web
    # starts before api is resolvable).
    resolver 127.0.0.11 valid=10s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 256;

    # Reverse-proxy the API so the SPA can call same-origin relative paths
    # (e.g. fetch('/api/vehicles')) instead of needing a separate public
    # hostname/CORS setup for the api service.
    location /api/ {
        set $api_upstream http://carnotea-prod-api:3001;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health/readiness probes live outside the /api prefix on the api side.
    location = /healthz {
        set $api_upstream http://carnotea-prod-api:3001;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /readyz {
        set $api_upstream http://carnotea-prod-api:3001;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
