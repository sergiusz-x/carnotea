name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./tooling/github/setup
      - run: pnpm lint
      - run: pnpm lint:ws
      - run: pnpm lint:tickets

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./tooling/github/setup
      - run: pnpm format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./tooling/github/setup
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: carnotea
          POSTGRES_USER: carnotea
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U carnotea -d carnotea"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://carnotea:postgres@localhost:5432/carnotea
    steps:
      - uses: actions/checkout@v7
      - uses: ./tooling/github/setup
      - run: cp .env.example .env
      - run: pnpm db:migrate
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./tooling/github/setup
      - run: cp .env.example .env
      - run: pnpm build

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./tooling/github/setup
      - name: pnpm audit
        run: pnpm audit --prod --audit-level=high

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, format, typecheck, test, build, audit]
    permissions:
      contents: read
      deployments: write
    uses: ./.github/workflows/deploy-dokploy.yml
    with:
      compose-id: ${{ vars.DOKPLOY_COMPOSE_ID }}
      environment-url: https://carnotea.sergiusz.dev
    secrets:
      dokploy-api-key: ${{ secrets.DOKPLOY_API_KEY }}
      cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
