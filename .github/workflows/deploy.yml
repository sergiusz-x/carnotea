name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_registry: ${{ steps.meta.outputs.image_registry }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v7

      - name: Derive image metadata
        id: meta
        shell: bash
        run: |
          owner_lc="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          short_sha="${GITHUB_SHA::12}"
          echo "image_registry=ghcr.io/${owner_lc}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_registry }}/carnotea-api:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_registry }}/carnotea-api:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_registry }}/carnotea-web:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_registry }}/carnotea-web:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Install SSH key
        shell: bash
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' '${{ secrets.DEPLOY_SSH_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' '${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}' > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy release to VPS
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" 'bash -se' <<EOF
          set -euo pipefail

          export IMAGE_REGISTRY="${{ needs.build-and-push.outputs.image_registry }}"
          export IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          export REGISTRY_USERNAME="${{ secrets.GHCR_USERNAME }}"
          export REGISTRY_TOKEN="${{ secrets.GHCR_TOKEN }}"
          export DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"

          cd "\${DEPLOY_PATH}"
          git fetch origin main
          git switch main
          git pull --ff-only origin main

          echo "\${REGISTRY_TOKEN}" | docker login ghcr.io -u "\${REGISTRY_USERNAME}" --password-stdin

          docker compose -f docker-compose.prod.yml up -d postgres
          docker compose -f docker-compose.prod.yml pull api web
          docker compose -f docker-compose.prod.yml --profile release run --rm migrate
          docker compose -f docker-compose.prod.yml up -d --wait api web caddy

          docker logout ghcr.io
          EOF
