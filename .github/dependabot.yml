version: 2
updates:
  # Root workspace dependencies (pnpm). As apps/packages are scaffolded, add a
  # block per directory or rely on the workspace-wide grouping below.
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
    groups:
      # Keep the noise down: one PR for minor/patch bumps across the workspace.
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'chore(ci)'
