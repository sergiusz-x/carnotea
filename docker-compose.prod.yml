# =============================================================================
# CarNotea — Production docker compose stack
#
# Deployed through Dokploy (Docker Compose application type): Dokploy builds
# `api`/`web`/`migrate` directly from the Dockerfiles below (no prebuilt
# registry image needed) and injects the variables below from its
# per-application Environment Variables UI at deploy time. Nothing here is
# read from a committed or on-disk .env file.
#
# Required variables (see docs/deployment.md § Secrets management):
#   DATABASE_URL, BETTER_AUTH_SECRET, BETTER_AUTH_URL, CORS_ORIGINS
#
# COMPOSE_PROFILES=release is ALSO required. `migrate` only runs under the
# `release` profile, and `api` now depends on it completing successfully
# (service_completed_successfully) — without this variable set, `docker
# compose up` refuses to start at all ("api depends on undefined service
# migrate"), a deliberate fail-loud instead of silently skipping migrations.
#
# TLS + the public domain are handled by Dokploy's own Traefik instance via
# its Domains UI (assign `carnotea.<yourdomain>` to the `web` service on port
# 80) — there is no reverse proxy in this stack.
# =============================================================================

name: carnotea-prod

services:
  # ---- PostgreSQL 16 --------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: carnotea-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carnotea}
      POSTGRES_USER: ${POSTGRES_USER:-carnotea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      POSTGRES_PORT: 5432
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - carnotea-prod
    expose:
      - 5432

  # ---- Migration (run once to apply DB migrations) ----------------------------
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: carnotea-api:local
    container_name: carnotea-prod-migrate
    restart: 'no'
    profiles: ['release']
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?error}
    networks:
      - carnotea-prod
    command: ['pnpm', '--filter', '@carnotea/db', 'db:deploy']

  # ---- Backups (run on demand; schedule via host cron) -----------------------
  backup:
    image: postgres:16-alpine
    container_name: carnotea-prod-backup
    restart: 'no'
    profiles:
      - ops
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carnotea}
      POSTGRES_USER: ${POSTGRES_USER:-carnotea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      BACKUP_DB_HOST: ${BACKUP_DB_HOST:-postgres}
      BACKUP_DB_PORT: ${BACKUP_DB_PORT:-5432}
      # Not required at compose-parse time (`:?error` would block deploying the
      # rest of the stack before backups are configured) — this profile-gated
      # service is never started by a normal `up`, and backup.sh itself
      # validates these are set before it runs.
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-carnotea/postgres}
      BACKUP_S3_ENDPOINT_URL: ${BACKUP_S3_ENDPOINT_URL:-}
      BACKUP_S3_SSE: ${BACKUP_S3_SSE:-AES256}
      BACKUP_S3_SSE_KMS_KEY_ID: ${BACKUP_S3_SSE_KMS_KEY_ID:-}
      BACKUP_KEEP_DAILY: ${BACKUP_KEEP_DAILY:-7}
      BACKUP_KEEP_WEEKLY: ${BACKUP_KEEP_WEEKLY:-8}
      BACKUP_WEEKLY_DAY: ${BACKUP_WEEKLY_DAY:-7}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${BACKUP_S3_REGION:-}
    volumes:
      - ./scripts:/scripts:ro
    networks:
      - carnotea-prod
    command:
      - sh
      - -ceu
      - |
        apk add --no-cache aws-cli >/dev/null
        /scripts/backup.sh

  # ---- API (NestJS / Fastify) -----------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: carnotea-api:local
    container_name: carnotea-prod-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 3001
      API_HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL:?error}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?error}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?error}
      CORS_ORIGINS: ${CORS_ORIGINS:?error}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-10}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      BODY_LIMIT: ${BODY_LIMIT:-1048576}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-CarNotea <noreply@localhost>}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-noreply@localhost}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - carnotea-prod
    expose:
      - 3001

  # ---- Web (Nginx static server) --------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: carnotea-web:local
    container_name: carnotea-prod-web
    restart: unless-stopped
    networks:
      - carnotea-prod
    expose:
      - 80

networks:
  carnotea-prod:
    name: carnotea-prod
    driver: bridge

volumes:
  postgres_prod_data:
    name: carnotea-prod-postgres-data
