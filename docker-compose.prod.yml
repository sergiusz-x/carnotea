# =============================================================================
# CarNotea — Production docker compose stack
#
# Deployed through Dokploy (Docker Compose application type): Dokploy builds
# `api`/`web`/`migrate` directly from the Dockerfiles below (no prebuilt
# registry image needed) and injects the variables below from its
# per-application Environment Variables UI at deploy time. Nothing here is
# read from a committed or on-disk .env file.
#
# PostgreSQL is NOT in this stack. It runs as a separate Dokploy Database
# service (Create Service → Database → PostgreSQL 16). The application connects
# to it exclusively through DATABASE_URL, which is set to the Internal
# Connection URL generated by that Dokploy service. See ADR-0015 and
# docs/deployment.md § PostgreSQL Database service for details.
#
# Required variables (see docs/deployment.md § Secrets management):
#   DATABASE_URL, BETTER_AUTH_SECRET, BETTER_AUTH_URL, CORS_ORIGINS
#
# COMPOSE_PROFILES=release is also required. `migrate` is profile-gated and
# `api` depends on it completing successfully before it starts — without the
# profile active, `docker compose up` refuses to start the stack at all
# ("api depends on undefined service migrate"), by design, so a missing
# profile fails loudly instead of silently skipping migrations.
#
# TLS + the public domain are handled by Dokploy's own Traefik instance via
# its Domains UI (assign `carnotea.<yourdomain>` to the `web` service on port
# 80) — there is no reverse proxy in this stack.
# =============================================================================

name: carnotea-prod

services:
  # ---- Migration (run once to apply DB migrations) ----------------------------
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: carnotea-api:local
    container_name: carnotea-prod-migrate
    restart: 'no'
    profiles: ['release']
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?error}
    networks:
      - carnotea-prod
    # `pnpm --filter @carnotea/db` doesn't work here: this image is built via
    # `pnpm deploy --filter @carnotea/api --prod`, which flattens @carnotea/db
    # into node_modules as a regular dependency rather than keeping it as a
    # separate pnpm-workspace project pnpm could --filter for. drizzle-kit is
    # invoked directly via node instead, run from @carnotea/db's own directory
    # so its relative drizzle.config.ts paths (./src/schema, ./migrations)
    # resolve. There's no node_modules/.bin/drizzle-kit symlink either — it's
    # a dependency of @carnotea/db, not a direct dependency of @carnotea/api,
    # so pnpm never hoists its bin here — hence the glob straight into the
    # pnpm store for its real entry point (bin.cjs isn't exposed via drizzle-
    # kit's package.json "exports", so `node -e "require.resolve(...)"` can't
    # be used to find it either; the glob is the simplest reliable path).
    command:
      [
        'sh',
        '-c',
        'cd /app/node_modules/@carnotea/db && node /app/node_modules/.pnpm/drizzle-kit@*/node_modules/drizzle-kit/bin.cjs migrate',
      ]

  # ---- API (NestJS / Fastify) -----------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: carnotea-api:local
    container_name: carnotea-prod-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 3001
      API_HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL:?error}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?error}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?error}
      CORS_ORIGINS: ${CORS_ORIGINS:?error}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-10}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      BODY_LIMIT: ${BODY_LIMIT:-1048576}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-CarNotea <noreply@localhost>}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-noreply@localhost}
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - carnotea-prod
    expose:
      - 3001

  # ---- Web (Nginx static server) --------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: carnotea-web:local
    container_name: carnotea-prod-web
    restart: unless-stopped
    networks:
      - carnotea-prod
    expose:
      - 80

networks:
  carnotea-prod:
    name: carnotea-prod
    driver: bridge
