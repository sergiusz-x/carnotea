name: carnotea

services:
  postgres:
    image: postgres:16-alpine
    container_name: carnotea-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carnotea}
      POSTGRES_USER: ${POSTGRES_USER:-carnotea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carnotea_dev_password}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
