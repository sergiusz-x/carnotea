name: carnotea

services:
  postgres:
    image: postgres:16-alpine
    container_name: carnotea-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carnotea}
      POSTGRES_USER: ${POSTGRES_USER:-carnotea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carnotea_dev_password}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mailpit:
    image: axllent/mailpit:latest
    container_name: carnotea-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8025/api/v1/ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: carnotea-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://carnotea:carnotea_dev_password@postgres:5432/carnotea
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: carnotea-web
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  postgres_data:
